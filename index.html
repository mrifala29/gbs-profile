<html lang="id">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="keywords" content="gadget bekas sidoarjo, laptop bekas, hp bekas sidoarjo, jual beli hp bekas, tablet bekas, smartwatch bekas, monitor bekas, keyboard bekas, mouse bekas" />
  <meta name="author" content="GBS — Gadget Bekas Sidoarjo" />

  <!-- Open Graph -->
  <meta property="og:title" content="GBS — Gadget Bekas Sidoarjo" />
  <meta property="og:description" content="Jual beli gadget bekas berkualitas di Sidoarjo. Bergaransi toko, harga terbaik, pengiriman cepat." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://gadgetbekassidoarjo.com" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="GBS — Gadget Bekas Sidoarjo" />

  <title>GBS — Gadget Bekas Sidoarjo | Laptop, HP, Tablet &amp; Lebih</title>

  <!-- Favicon inline SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%237C5CFC'/><text x='50%' y='56%' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='Arial' font-weight='700' font-size='13'>GBS</text></svg>" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />

  <!-- Main CSS -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>

  <!-- ==================== PRELOADER ==================== -->
  <div id="preloader" aria-hidden="true">
    <span class="preloader-logo">GBS</span>
    <div class="preloader-bar"><div class="preloader-progress"></div></div>
    <span class="preloader-text">Gadget Bekas Sidoarjo</span>
  </div>

  <!-- ==================== CURSOR ==================== -->
  <div class="cursor-dot" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>

  <!-- NAVBAR -->
  <div id="navbar-container"></div>

  <main>
    <!-- HERO -->
    <div id="hero-container"></div>
    <!-- TICKER -->
    <div id="ticker-container"></div>
    <!-- STATS -->
    <div id="stats-container"></div>
    <!-- ABOUT -->
    <div id="about-container"></div>
    <!-- PRODUCTS -->
    <div id="products-container"></div>
    <!-- PROCESS -->
    <div id="process-container"></div>
    <!-- WHY US -->
    <div id="why-us-container"></div>
    <!-- TESTIMONIALS -->
    <div id="testimonials-container"></div>
    <!-- SALES REPORT -->
    <div id="sales-report-container"></div>
    <!-- CTA -->
    <div id="cta-container"></div>
  </main>

  <!-- FOOTER -->
  <div id="footer-container"></div>

  <!-- Load partials, then main.js -->
  <script>
    const partials = [
      ['navbar',       'navbar-container'],
      ['hero',         'hero-container'],
      ['ticker',       'ticker-container'],
      ['stats',        'stats-container'],
      ['about',        'about-container'],
      ['products',     'products-container'],
      ['process',      'process-container'],
      ['why-us',       'why-us-container'],
      ['testimonials', 'testimonials-container'],
      ['sales-report', 'sales-report-container'],
      ['cta',          'cta-container'],
      ['footer',       'footer-container'],
    ];

    async function loadPartials() {
      document.getElementById('preloader').style.display = 'none';

      await Promise.all(partials.map(async ([name, id]) => {
        const el = document.getElementById(id);
        if (!el) return;
        const res = await fetch(`partials/${name}.html`);
        if (res.ok) el.innerHTML = await res.text();
      }));

      const s = document.createElement('script');
      s.src = 'assets/js/main.js';
      document.body.appendChild(s);
    }

    document.addEventListener('DOMContentLoaded', loadPartials);
  </script>
</body>
</html>
