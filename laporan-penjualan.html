<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Laporan Penjualan GBS 2025 — Rekap lengkap penjualan gadget bekas Sidoarjo per kategori, lokasi, tren bulanan, dan lebih." />
  <meta name="robots" content="noindex" />

  <title>Laporan Penjualan — GBS Gadget Bekas Sidoarjo</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%237C5CFC'/><text x='50%' y='56%' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='Arial' font-weight='700' font-size='13'>GBS</text></svg>" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />

  <!-- Main CSS -->
  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- Page-specific overrides -->
  <style>
    body { cursor: auto; }
    .cursor-dot, .cursor-ring { display: none; }
    a, button, .btn, .kpi-card { cursor: pointer; }
    .navbar {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 0;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div id="report-navbar-container"></div>

  <main>
    <!-- HEADER -->
    <div id="report-header-container"></div>
    <!-- KPI CARDS -->
    <div id="report-kpi-container"></div>
    <!-- CHARTS -->
    <div id="report-charts-container"></div>
    <!-- TABLES -->
    <div id="report-tables-container"></div>
    <!-- CTA -->
    <div id="report-cta-container"></div>
  </main>

  <!-- FOOTER -->
  <div id="report-footer-container"></div>

  <!-- Floating WhatsApp -->
  <a href="https://wa.me/6281234567890" target="_blank" rel="noopener noreferrer" class="wa-float" aria-label="WhatsApp GBS">
    <i class="fab fa-whatsapp" aria-hidden="true" style="color:#fff"></i>
    <span class="wa-float-tooltip">Chat WhatsApp</span>
  </a>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Load partials, then scripts -->
  <script>
    const reportPartials = [
      ['report/report-navbar',  'report-navbar-container'],
      ['report/report-header',  'report-header-container'],
      ['report/report-kpi',     'report-kpi-container'],
      ['report/report-charts',  'report-charts-container'],
      ['report/report-tables',  'report-tables-container'],
      ['report/report-cta',     'report-cta-container'],
      ['report/report-footer',  'report-footer-container'],
    ];

    async function loadReportPartials() {
      console.log('Starting loadReportPartials...');
      for (const [name, id] of reportPartials) {
        const el = document.getElementById(id);
        if (!el) {
          console.warn(`Container #${id} not found`);
          continue;
        }
        try {
          console.log(`Loading partials/${name}.html...`);
          const res = await fetch(`partials/${name}.html`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          el.innerHTML = await res.text();
          console.log(`✅ Loaded ${name}`);
        } catch (err) {
          console.error(`❌ Failed ${name}:`, err);
          el.innerHTML = `<p style="color:red">Error loading ${name}</p>`;
        }
      }

      console.log('Loading main.js...');
      const main = document.createElement('script');
      main.src = 'assets/js/main.js';
      main.onload = () => {
        console.log('✅ main.js loaded');
        // Trigger initReveal manually (no preloader on report page)
        if (window.initReveal) {
          setTimeout(() => window.initReveal(), 100);
        }
        console.log('Loading charts.js...');
        const charts = document.createElement('script');
        charts.src = 'assets/js/charts.js';
        charts.onload = () => console.log('✅ charts.js loaded');
        charts.onerror = (err) => console.error('❌ charts.js failed:', err);
        document.body.appendChild(charts);
      };
      main.onerror = (err) => console.error('❌ main.js failed:', err);
      document.body.appendChild(main);
    }

    document.addEventListener('DOMContentLoaded', loadReportPartials);
  </script>

</body>
</html>
